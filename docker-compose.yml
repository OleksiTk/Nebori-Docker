services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebori_user -d nebori"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5433:5432"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
        NEXT_PUBLIC_USER_API_URL: http://localhost:8002
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - auth
      - user

  auth:
    build:
      context: ./backend
      dockerfile: auth/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  user:
    build:
      context: ./backend
      dockerfile: user/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
