services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebori_user -d nebori"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5433:5432"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
        NEXT_PUBLIC_USER_API_URL: http://localhost:8002
        NEXT_PUBLIC_ACHIEVEMENT_API_URL: http://localhost:8003
        NEXT_PUBLIC_NOTIFICATIONS_API_URL: http://localhost:8004
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - auth
      - user
      - achievement
      - notifications

  auth:
    build:
      context: ./backend
      dockerfile: auth/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user:
    build:
      context: ./backend
      dockerfile: user/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  achievement:
    build:
      context: ./backend
      dockerfile: achievement/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  achievement-consumer:
    build:
      context: ./backend
      dockerfile: achievement/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: python -m achievement.manage consume_registrations
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifications:
    build:
      context: ./backend
      dockerfile: notifications/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifications-consumer:
    build:
      context: ./backend
      dockerfile: notifications/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: nebori
      POSTGRES_USER: nebori_user
      POSTGRES_PASSWORD: nebori_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: python -m notifications.manage consume_notifications
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
